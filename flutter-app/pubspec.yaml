name: nege_employee
description: "Nege Systems - Employee Mobile App"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1

  # Navigation
  go_router: ^14.8.1

  # Models / Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  geolocator: ^13.0.2
  http: ^1.3.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint:
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
